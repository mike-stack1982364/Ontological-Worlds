name: Match Logic Audit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Mode 1 Triadic Entailment audit
        run: node tests/mode-one-spatial-entailment.test.js
      - name: Run approved-template Mode 1 audit
        run: node tests/mode-one-approved-trials-v7.test.js
      - name: Run legacy Mode 1 N-back levels 1–8 audit
        run: node tests/mode-one-nback-v8.test.js
      - name: Run 80-case complete-profile N-back audit
        run: node tests/mode-one-nback-v9.test.js
      - name: Run live level-specific 80-case curriculum audit
        run: node tests/mode-one-nback-v10.test.js
      - name: Run live 160-case meta-logical curriculum audit
        run: node tests/mode-one-nback-v11.test.js
      - name: Run preserved Mode 2 Ontological Integration audit
        run: node tests/mode-one-match-logic.test.js
