name: Validate logic engines

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check mode-release-gate.js
          node --check audio-only-display.js
          node --check response-window.js
          node --check ontology-integration-v4.js
          node --check mode-one-triadic.js
          node --check cognitive-interference-v3.js
          node --check mode-one-interference.js
          node --check audio-accessibility.js
      - name: Install DOM test runtime
        run: npm install --no-save jsdom@26
      - name: Run relational logic smoke tests
        run: |
          set -o pipefail
          node tests/interference-smoke.mjs 2>&1 | tee test-output.log
      - name: Preserve smoke-test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: test-output.log
          if-no-files-found: error
