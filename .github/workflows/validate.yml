name: Validate logic engines

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check ontology-integration-v4.js
          node --check cognitive-interference-v3.js
          node --check audio-accessibility.js
      - name: Install DOM test runtime
        run: npm install --no-save jsdom@26
      - name: Run relational logic smoke tests
        run: node tests/interference-smoke.mjs
